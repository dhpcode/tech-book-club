<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Book Club</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Martian+Mono:wght@100..800&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Favicon -->
  <link rel="icon" href="images/favicon-32x32.png">

</head>

<body>
  <div class="site-header-intro-wrapper">
    <header class="site-header">
      <div class="site-header__container">
        <a href="index.html" class="site-header__logo logo">
          <img src="images/logo.svg" alt="Site header logo" width="190" height="36">
        </a>
      </div>
    </header>

    <!-- HERO -->

    <section class="hero">
      <div class="container hero__container">
        <div class="hero__content">
          <h1 class="hero-title">Join the ultimate tech club</h1>
          <p class="hero__text">
            Turn your reading time into learning time with fellow tech enthusiasts. Get curated recommendations, join
            vibrant discussions, and level up your skills one chapter at a time.
          </p>
          <a class="hero__actions" href="#"><span>Review membership options</span></a>
          <div class="content__joined-info">
            <img src="images/image-avatars.webp" alt="" class="content__joined-info-img">
            <div class="content__info-joined-info">
              <span class="stars-list">
                <img src="images/icon-star.svg" alt="">
                <img src="images/icon-star.svg" alt="">
                <img src="images/icon-star.svg" alt="">
                <img src="images/icon-star.svg" alt="">
                <img src="images/icon-star.svg" alt="">
              </span>
              <span class="joined-devs">200+ developers joined already</span>
            </div>
          </div>
        </div>
        <div class="hero__image">
          <img class="hero__img" src="images/image-hero-desktop.webp" alt="A group of people staring at notebook" width="536" height="606">
        </div>
      </div>
    </section>
  </div>

  <script src="js/main.js"></script>
</body>

</html>
